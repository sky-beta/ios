name: Download com.tgc.sky.android from Google Play

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      app_id:
        description: Fixed Android package name
        required: true
        default: com.tgc.sky.android
        type: string
      source:
        description: Download source
        required: true
        default: google-play
        type: choice
        options:
          - google-play
      publish_release:
        description: Keep compatibility with the download service
        required: false
        default: true
        type: boolean
      request_id:
        description: Caller request identifier
        required: false
        default: ""
        type: string
      version_probe:
        description: Caller-provided Huawei redirect fingerprint
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: apkeep-com.tgc.sky.android
      cancel-in-progress: false
    env:
      PACKAGE_NAME: com.tgc.sky.android
      HUAWEI_APP_URL: ${{ vars.HUAWEI_APP_URL }}
      GOOGLE_PLAY_EMAIL: ${{ secrets.GOOGLE_PLAY_EMAIL }}
      GOOGLE_PLAY_AAS_TOKEN: ${{ secrets.GOOGLE_PLAY_AAS_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out Pages source
        uses: actions/checkout@v4

      - name: Validate fixed configuration
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            [[ "${{ inputs.app_id }}" == "$PACKAGE_NAME" ]] || {
              echo "Only $PACKAGE_NAME is allowed." >&2
              exit 1
            }
            [[ "${{ inputs.source }}" == "google-play" ]] || {
              echo "Only Google Play is allowed." >&2
              exit 1
            }
          fi
          for name in GOOGLE_PLAY_EMAIL GOOGLE_PLAY_AAS_TOKEN GH_TOKEN HUAWEI_APP_URL; do
            [[ -n "${!name:-}" ]] || { echo "Missing secret: $name" >&2; exit 1; }
          done

      - name: Read Huawei 302 fingerprint
        id: huawei
        shell: bash
        run: |
          set -euo pipefail
          headers="$(curl --silent --show-error --dump-header - --output /dev/null --max-redirs 0 "$HUAWEI_APP_URL")"
          location="$(sed -n 's/^[Ll]ocation:[[:space:]]*//p' <<<"$headers" | tr -d '\r' | tail -n 1)"
          [[ -n "$location" ]] || { echo "Huawei URL did not return a 302 Location." >&2; exit 1; }
          {
            echo 'location<<HUAWEI_LOCATION_EOF'
            echo "$location"
            echo 'HUAWEI_LOCATION_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Compare with the stored GitHub release
        id: compare
        shell: bash
        env:
          HUAWEI_LOCATION: ${{ steps.huawei.outputs.location }}
        run: |
          set -euo pipefail
          tag="apkeep-${PACKAGE_NAME}"
          asset="${PACKAGE_NAME}.apk"
          dex_asset="classes2.dex"
          buildconfig_asset="BuildConfig.txt"
          changed=true
          has_build_access_key=false
          sky_build_access_key=""
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json body,assets > current-release.json 2>/dev/null; then
            old_location="$(jq -r '.body' current-release.json | sed -n 's/^Huawei redirect: //p' | tail -n 1)"
            sky_build_access_key="$(jq -r '.body' current-release.json | sed -n 's/^SKY_BUILD_ACCESS_KEY: //p' | tail -n 1)"
            if [[ "$sky_build_access_key" =~ ^[0-9]{10}-[0-9a-fA-F]{64}$ ]]; then
              has_build_access_key=true
            fi
            asset_exists="$(jq -r --arg name "$asset" '[.assets[] | select(.name == $name)] | length' current-release.json)"
            dex_asset_exists="$(jq -r --arg name "$dex_asset" '[.assets[] | select(.name == $name)] | length' current-release.json)"
            buildconfig_asset_exists="$(jq -r --arg name "$buildconfig_asset" '[.assets[] | select(.name == $name)] | length' current-release.json)"
            if [[ "$old_location" == "$HUAWEI_LOCATION" && "$asset_exists" == "1" && "$dex_asset_exists" == "1" && "$buildconfig_asset_exists" == "1" ]]; then
              changed=false
            fi
          fi
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
          echo "dex_asset=$dex_asset" >> "$GITHUB_OUTPUT"
          echo "buildconfig_asset=$buildconfig_asset" >> "$GITHUB_OUTPUT"
          echo "has_build_access_key=$has_build_access_key" >> "$GITHUB_OUTPUT"
          {
            echo 'sky_build_access_key<<EXISTING_SKY_BUILD_ACCESS_KEY_EOF'
            echo "$sky_build_access_key"
            echo 'EXISTING_SKY_BUILD_ACCESS_KEY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Download from Google Play
        if: steps.compare.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p downloads release
          docker run --rm \
            --volume "$PWD/downloads:/output" \
            ghcr.io/efforg/apkeep:stable \
            -a "$PACKAGE_NAME" \
            -d google-play \
            -e "$GOOGLE_PLAY_EMAIL" \
            -t "$GOOGLE_PLAY_AAS_TOKEN" \
            /output
          find downloads -type f -printf '%P\n'

      - name: Prepare package-named APK
        if: steps.compare.outputs.changed == 'true'
        id: package
        shell: bash
        run: |
          set -euo pipefail
          apk_file="$(find downloads -type f -iname 'base.apk' -print -quit)"
          [[ -n "$apk_file" ]] || apk_file="$(find downloads -type f -iname "${PACKAGE_NAME}.apk" -print -quit)"
          [[ -n "$apk_file" ]] || apk_file="$(find downloads -type f -iname '*.apk' -print -quit)"
          [[ -n "$apk_file" ]] || { echo "APKeep did not produce an APK." >&2; exit 1; }
          cp "$apk_file" "release/${PACKAGE_NAME}.apk"
          unzip -p "release/${PACKAGE_NAME}.apk" classes2.dex > release/classes2.dex
          [[ -s release/classes2.dex ]] || { echo "classes2.dex is missing or empty." >&2; exit 1; }

          aapt_bin="$(find "${ANDROID_HOME}/build-tools" -type f -name aapt -print 2>/dev/null | sort -V | tail -n 1)"
          badging="$($aapt_bin dump badging "release/${PACKAGE_NAME}.apk" 2>/dev/null | head -n 1 || true)"
          version_name="$(sed -n "s/.*versionName='\([^']*\)'.*/\1/p" <<<"$badging")"
          version_code="$(sed -n "s/.*versionCode='\([^']*\)'.*/\1/p" <<<"$badging")"
          if [[ -n "$version_code" ]]; then
            version_name="$(sed -E "s/[[:space:]]*\\(${version_code}\\)[[:space:]]*$//" <<<"$version_name")"
          fi
          echo "version_name=${version_name:-unknown}" >> "$GITHUB_OUTPUT"
          echo "version_code=${version_code:-unknown}" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum "release/${PACKAGE_NAME}.apk" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Retrieve cached APK for metadata
        if: steps.compare.outputs.changed != 'true' && steps.compare.outputs.has_build_access_key != 'true'
        shell: bash
        env:
          TAG: ${{ steps.compare.outputs.tag }}
          ASSET: ${{ steps.compare.outputs.asset }}
        run: |
          set -euo pipefail
          mkdir -p release
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "$ASSET" --dir release

      - name: Read SKY_BUILD_ACCESS_KEY from BuildConfig
        if: steps.compare.outputs.changed == 'true' || steps.compare.outputs.has_build_access_key != 'true'
        id: build_config
        shell: bash
        run: |
          set -euo pipefail
          apk="release/${PACKAGE_NAME}.apk"
          [[ -s release/classes2.dex ]] || unzip -p "$apk" classes2.dex > release/classes2.dex
          [[ -s release/classes2.dex ]] || { echo "classes2.dex is missing or empty." >&2; exit 1; }
          strings -a release/classes2.dex > release/classes2.strings
          grep -Fxq 'Lcom/tgc/sky/BuildConfig;' release/classes2.strings || {
            echo 'Missing Lcom/tgc/sky/BuildConfig; in classes2.dex.' >&2
            exit 1
          }
          grep -Fxq 'SKY_BUILD_ACCESS_KEY' release/classes2.strings || {
            echo 'Missing SKY_BUILD_ACCESS_KEY in classes2.dex.' >&2
            exit 1
          }
          matches="$(grep -oE '[0-9]{10}-[0-9a-fA-F]{64}' release/classes2.strings | sort -u)"
          match_count="$(grep -c . <<<"$matches" || true)"
          [[ "$match_count" == "1" ]] || {
            echo "Expected one BuildConfig access key, found $match_count." >&2
            exit 1
          }
          {
            echo 'sky_build_access_key<<SKY_BUILD_ACCESS_KEY_EOF'
            echo "$matches"
            echo 'SKY_BUILD_ACCESS_KEY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Decompile tgc.sky.BuildConfig to TXT
        if: steps.compare.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          jadx_version="1.5.3"
          curl -fsSL "https://github.com/skylot/jadx/releases/download/v${jadx_version}/jadx-${jadx_version}.zip" -o /tmp/jadx.zip
          unzip -q /tmp/jadx.zip -d /tmp/jadx
          mkdir -p /tmp/buildconfig
          /tmp/jadx/bin/jadx --single-class tgc.sky.BuildConfig --single-class-output release/BuildConfig.txt release/classes2.dex
          [[ -s release/BuildConfig.txt ]] || { echo "Failed to decompile tgc.sky.BuildConfig." >&2; exit 1; }

      - name: Overwrite GitHub release asset
        if: steps.compare.outputs.changed == 'true'
        shell: bash
        env:
          HUAWEI_LOCATION: ${{ steps.huawei.outputs.location }}
          TAG: ${{ steps.compare.outputs.tag }}
          ASSET: ${{ steps.compare.outputs.asset }}
          DEX_ASSET: ${{ steps.compare.outputs.dex_asset }}
          BUILDCONFIG_ASSET: ${{ steps.compare.outputs.buildconfig_asset }}
          VERSION_NAME: ${{ steps.package.outputs.version_name }}
          VERSION_CODE: ${{ steps.package.outputs.version_code }}
          SHA256: ${{ steps.package.outputs.sha256 }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$PACKAGE_NAME" --notes "Preparing Google Play download."
          fi
          gh release upload "$TAG" "release/$ASSET" "release/$DEX_ASSET" "release/$BUILDCONFIG_ASSET" --repo "$GITHUB_REPOSITORY" --clobber
          checked_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          notes="$(printf 'Google Play APK cached by APKeep.\n\nPackage: %s\nFilename: %s\nVersion: %s (%s)\nSHA256: %s\nHuawei redirect: %s\nLast checked: %s\nRequest ID: %s\n' "$PACKAGE_NAME" "$ASSET" "$VERSION_NAME" "$VERSION_CODE" "$SHA256" "$HUAWEI_LOCATION" "$checked_at" '${{ inputs.request_id }}')"
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --title "$PACKAGE_NAME" --notes "$notes"

      - name: Record successful check time
        shell: bash
        env:
          TAG: ${{ steps.compare.outputs.tag }}
          SKY_BUILD_ACCESS_KEY: ${{ steps.build_config.outputs.sky_build_access_key || steps.compare.outputs.sky_build_access_key }}
        run: |
          set -euo pipefail
          checked_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          body="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body --jq .body)"
          updated_body="$(awk -v checked="Last checked: $checked_at" -v access_key="SKY_BUILD_ACCESS_KEY: $SKY_BUILD_ACCESS_KEY" '
            BEGIN { checked_found=0; key_found=0 }
            /^Last checked: / { print checked; checked_found=1; next }
            /^SKY_BUILD_ACCESS_KEY: / { print access_key; key_found=1; next }
            { print }
            END {
              if (!key_found) print access_key
              if (!checked_found) print checked
            }
          ' <<<"$body")"
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes "$updated_body"

      - name: Update Pages status data
        shell: bash
        env:
          TAG: ${{ steps.compare.outputs.tag }}
          DEX_ASSET: ${{ steps.compare.outputs.dex_asset }}
          HUAWEI_LOCATION: ${{ steps.huawei.outputs.location }}
        run: |
          set -euo pipefail
          package_dir="bese/${PACKAGE_NAME}"
          mkdir -p "$package_dir"
          if [[ -s release/classes2.dex ]]; then
            cp release/classes2.dex "$package_dir/classes2.dex"
          else
            dex_cache_dir="$(mktemp -d)"
            gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "$DEX_ASSET" --dir "$dex_cache_dir"
            cp "$dex_cache_dir/$DEX_ASSET" "$package_dir/classes2.dex"
          fi
          [[ -s "$package_dir/classes2.dex" ]] || { echo "classes2.dex is missing or empty." >&2; exit 1; }
          body="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body --jq .body)"
          version_line="$(sed -n 's/^Version: //p' <<<"$body" | head -n 1)"
          version_name="$(sed -E 's/^([0-9]+(\.[0-9]+)*).*/\1/' <<<"$version_line")"
          version_code="$(sed -n -E 's/.*\(([0-9]+)\).*/\1/p' <<<"$version_line" | head -n 1)"
          last_checked="$(sed -n 's/^Last checked: //p' <<<"$body" | head -n 1)"
          sky_build_access_key="$(sed -n 's/^SKY_BUILD_ACCESS_KEY: //p' <<<"$body" | head -n 1)"
          jq -n \
            --arg package "$PACKAGE_NAME" \
            --arg version "$version_name" \
            --arg version_code "$version_code" \
            --arg last_checked "$last_checked" \
            --arg sky_build_access_key "$sky_build_access_key" \
            --arg huawei_download_url "$HUAWEI_LOCATION" \
            '{package:$package,version:$version,version_code:$version_code,sky_build_access_key:$sky_build_access_key,last_checked:$last_checked,huawei_download_url:$huawei_download_url}' \
            > "bese/${PACKAGE_NAME}/status.json"
          jq -n \
            --arg sky_build_access_key "$sky_build_access_key" \
            '{class:"com.tgc.sky.BuildConfig",dex:"classes2.dex",SKY_BUILD_ACCESS_KEY:$sky_build_access_key}' \
            > "bese/${PACKAGE_NAME}/sky.json"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add "bese/${PACKAGE_NAME}/status.json" "bese/${PACKAGE_NAME}/sky.json" "bese/${PACKAGE_NAME}/classes2.dex"
          if ! git diff --cached --quiet; then
            git commit -m "Update APK check status"
            git push
          fi

      - name: Publish result
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.compare.outputs.tag }}/${{ steps.compare.outputs.asset }}"
          dex_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.compare.outputs.tag }}/${{ steps.compare.outputs.dex_asset }}"
          state="unchanged"
          [[ "${{ steps.compare.outputs.changed }}" == "true" ]] && state="updated"
          {
            echo "## Google Play APK"
            echo
            echo "- Package: \`$PACKAGE_NAME\`"
            echo "- State: $state"
            echo "- Huawei 302: \`${{ steps.huawei.outputs.location }}\`"
            echo "- APK: [$url]($url)"
            echo "- classes2.dex: [$dex_url]($dex_url)"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "$url"
