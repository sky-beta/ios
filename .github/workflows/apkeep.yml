name: Download APK with APKeep

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "Android package name, optionally with @version"
        required: true
        type: string
      source:
        description: "Download source"
        required: true
        default: google-play
        type: choice
        options:
          - google-play
          - apk-pure
          - f-droid
          - huawei-app-gallery
      publish_release:
        description: "Publish a direct APK download"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: apkeep-${{ inputs.app_id }}
      cancel-in-progress: false
    env:
      APP_ID: ${{ inputs.app_id }}
      SOURCE: ${{ inputs.source }}
      GOOGLE_PLAY_EMAIL: ${{ secrets.GOOGLE_PLAY_EMAIL }}
      GOOGLE_PLAY_AAS_TOKEN: ${{ secrets.GOOGLE_PLAY_AAS_TOKEN }}

    steps:
      - name: Prepare output directory
        run: mkdir -p downloads release

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$APP_ID" =~ ^[A-Za-z0-9_]+(\.[A-Za-z0-9_]+)+(@[A-Za-z0-9._+-]+)?$ ]]; then
            echo "Invalid app ID: $APP_ID" >&2
            exit 1
          fi

          if [[ "$SOURCE" == "google-play" ]]; then
            if [[ -z "$GOOGLE_PLAY_EMAIL" || -z "$GOOGLE_PLAY_AAS_TOKEN" ]]; then
              echo "Google Play requires GOOGLE_PLAY_EMAIL and GOOGLE_PLAY_AAS_TOKEN secrets." >&2
              exit 1
            fi
          fi

      - name: Download APK
        shell: bash
        run: |
          set -euo pipefail
          args=(-a "$APP_ID" -d "$SOURCE")

          if [[ "$SOURCE" == "google-play" ]]; then
            args+=(-e "$GOOGLE_PLAY_EMAIL" -t "$GOOGLE_PLAY_AAS_TOKEN")
          fi

          docker run --rm \
            --volume "$PWD/downloads:/output" \
            ghcr.io/efforg/apkeep:stable \
            "${args[@]}" /output

      - name: List downloaded files
        run: find downloads -maxdepth 2 -type f -printf '%P\n'

      - name: Prepare direct APK
        if: ${{ inputs.publish_release }}
        shell: bash
        run: |
          set -euo pipefail
          apk_file="$(find downloads -type f -iname '*.apk' -print -quit)"
          if [[ -z "$apk_file" ]]; then
            echo "APKeep did not produce an APK file." >&2
            exit 1
          fi
          cp "$apk_file" "release/${APP_ID}.apk"

      - name: Publish direct APK download
        if: ${{ inputs.publish_release }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="apkeep-${APP_ID}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "APKeep: ${APP_ID}" \
              --notes "Direct APK downloaded from Google Play by APKeep."
          fi
          gh release upload "$tag" "release/${APP_ID}.apk" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Upload workflow artifact
        if: ${{ !inputs.publish_release }}
        uses: actions/upload-artifact@v4
        with:
          name: apkeep-download
          path: downloads/
          if-no-files-found: error
          retention-days: 7
