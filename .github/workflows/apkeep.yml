name: Download APK with APKeep

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "Android package name, optionally with @version"
        required: true
        type: string
      source:
        description: "Download source"
        required: true
        default: google-play
        type: choice
        options:
          - google-play
          - apk-pure
          - f-droid
          - huawei-app-gallery
      publish_release:
        description: "Publish a direct APK download"
        required: false
        default: false
        type: boolean
      request_id:
        description: "Caller request identifier"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: apkeep-${{ inputs.app_id }}
      cancel-in-progress: true
    env:
      APP_ID: ${{ inputs.app_id }}
      SOURCE: ${{ inputs.source }}
      GOOGLE_PLAY_EMAIL: ${{ secrets.GOOGLE_PLAY_EMAIL }}
      GOOGLE_PLAY_AAS_TOKEN: ${{ secrets.GOOGLE_PLAY_AAS_TOKEN }}

    steps:
      - name: Prepare output directory
        run: mkdir -p downloads release

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$APP_ID" =~ ^[A-Za-z0-9_]+(\.[A-Za-z0-9_]+)+(@[A-Za-z0-9._+-]+)?$ ]]; then
            echo "Invalid app ID: $APP_ID" >&2
            exit 1
          fi

          if [[ "$SOURCE" == "google-play" ]]; then
            if [[ -z "$GOOGLE_PLAY_EMAIL" || -z "$GOOGLE_PLAY_AAS_TOKEN" ]]; then
              echo "Google Play requires GOOGLE_PLAY_EMAIL and GOOGLE_PLAY_AAS_TOKEN secrets." >&2
              exit 1
            fi
          fi

      - name: Download APK
        shell: bash
        run: |
          set -euo pipefail
          args=(-a "$APP_ID" -d "$SOURCE")

          if [[ "$SOURCE" == "google-play" ]]; then
            args+=(-e "$GOOGLE_PLAY_EMAIL" -t "$GOOGLE_PLAY_AAS_TOKEN")
          fi

          docker run --rm \
            --volume "$PWD/downloads:/output" \
            ghcr.io/efforg/apkeep:stable \
            "${args[@]}" /output

      - name: List downloaded files
        run: find downloads -maxdepth 2 -type f -printf '%P\n'

      - name: Prepare direct APK
        if: ${{ inputs.publish_release }}
        shell: bash
        run: |
          set -euo pipefail
          apk_file="$(find downloads -type f -iname '*.apk' -print -quit)"
          if [[ -z "$apk_file" ]]; then
            echo "APKeep did not produce an APK file." >&2
            exit 1
          fi
          cp "$apk_file" "release/${APP_ID}.apk"

      - name: Publish direct APK download
        if: ${{ inputs.publish_release }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="apkeep-${APP_ID}"
          asset_name="${APP_ID}.apk"
          new_sha="$(sha256sum "release/$asset_name" | awk '{print $1}')"
          new_digest="sha256:${new_sha}"

          aapt_bin="$(command -v aapt || true)"
          if [[ -z "$aapt_bin" && -n "${ANDROID_HOME:-}" ]]; then
            aapt_bin="$(find "$ANDROID_HOME/build-tools" -type f -name aapt -print 2>/dev/null | sort -V | tail -n 1)"
          fi

          version_name="unknown"
          version_code="unknown"
          if [[ -n "$aapt_bin" ]]; then
            badging="$($aapt_bin dump badging "release/$asset_name" 2>/dev/null | head -n 1 || true)"
            parsed_name="$(sed -n "s/.*versionName='\([^']*\)'.*/\1/p" <<<"$badging")"
            parsed_code="$(sed -n "s/.*versionCode='\([^']*\)'.*/\1/p" <<<"$badging")"
            [[ -n "$parsed_name" ]] && version_name="$parsed_name"
            [[ -n "$parsed_code" ]] && version_code="$parsed_code"
          fi

          changed=true
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "APKeep: ${APP_ID}" \
              --notes "Preparing direct APK download."
          else
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" > current-release.json
            old_digest="$(jq -r --arg name "$asset_name" '.assets[] | select(.name == $name) | .digest // empty' current-release.json)"
            if [[ -n "$old_digest" && "$old_digest" == "$new_digest" ]]; then
              changed=false
            fi
          fi

          if [[ "$changed" == true ]]; then
            gh release upload "$tag" "release/$asset_name" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi

          checked_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          state="already current"
          [[ "$changed" == true ]] && state="updated"
          notes="$(printf 'Direct APK downloaded from Google Play by APKeep.\n\nPackage: %s\nVersion: %s (%s)\nSHA256: %s\nState: %s\nLast checked: %s\nRequest ID: %s\n' "$APP_ID" "$version_name" "$version_code" "$new_sha" "$state" "$checked_at" '${{ inputs.request_id }}')"
          gh release edit "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "APKeep: ${APP_ID}" \
            --notes "$notes"

      - name: Upload workflow artifact
        if: ${{ !inputs.publish_release }}
        uses: actions/upload-artifact@v4
        with:
          name: apkeep-download
          path: downloads/
          if-no-files-found: error
          retention-days: 7
